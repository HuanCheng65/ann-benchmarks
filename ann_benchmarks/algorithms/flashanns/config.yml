float:
  euclidean:
  - base_args:
      - '@metric'
    constructor: Flashanns
    disabled: true
    docker_tag: ann-benchmarks-flashanns
    module: ann_benchmarks.algorithms.flashanns
    name: flashanns
    run_groups:
      baseline:
        arg_groups:
          - index_params:
              flashanns_home: ../quiver
              pq_size: 32
              search_memory_gb: 4
              build_memory_gb: 16
              max_degree: 128
              l_build: 200
              pivot_sample_size: 1000000
              pivot_graph_degree: 32
              pivot_graph_l_build: 50
            search_params:
              - num_blocks: 756
                poll_threads: 6
                poll_contexts: 7
                pipe_width: 4
                ef_search: 40
        query_args: [[20, 30, 40, 50, 60, 80, 100]]
