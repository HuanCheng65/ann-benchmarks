float:
  euclidean:
  - base_args:
      - '@metric'
    constructor: GustannOriginal
    disabled: true
    docker_tag: ann-benchmarks-gustann
    module: ann_benchmarks.algorithms.gustann_original
    name: gustann-original
    run_groups:
      baseline:
        arg_groups:
          - index_params:
              gustann_home: ../GustANN
              pq_size: 32
              search_memory_gb: 4
              build_memory_gb: 16
              max_degree: 128
              l_build: 200
              pivot_sample_size: 1000000
              pivot_graph_degree: 32
              pivot_graph_l_build: 50
            search_params:
              - minibatch: 1
                thread: 1
                ctx_per_thread: 1
                ef_search: 40
              - minibatch: 32
                thread: 1
                ctx_per_thread: 1
                ef_search: 40
              - minibatch: 256
                thread: 1
                ctx_per_thread: 1
                ef_search: 40
        query_args: [[20, 30, 40, 50, 80, 100]]
